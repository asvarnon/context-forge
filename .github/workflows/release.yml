name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target.os }})
    runs-on: ${{ matrix.target.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        target:
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            napi-lib: libcf_napi.so
            cli-name: cf
            cli-artifact: cf-linux-x64
            node-artifact: cf_napi-linux-x64.node
            vsce-target: linux-x64
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            napi-lib: cf_napi.dll
            cli-name: cf.exe
            cli-artifact: cf-windows-x64.exe
            node-artifact: cf_napi-windows-x64.node
            vsce-target: win32-x64
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            napi-lib: libcf_napi.dylib
            cli-name: cf
            cli-artifact: cf-darwin-arm64
            node-artifact: cf_napi-darwin-arm64.node
            vsce-target: darwin-arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: release-${{ matrix.target.os }}

      - name: Build CLI (release)
        run: cargo build -p cf-cli --release --target ${{ matrix.target.rust-target }}

      - name: Build napi (release)
        run: cargo build -p cf-napi --release --target ${{ matrix.target.rust-target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target.rust-target }}/release/${{ matrix.target.cli-name }} staging/${{ matrix.target.cli-artifact }}
          cp target/${{ matrix.target.rust-target }}/release/${{ matrix.target.napi-lib }} staging/${{ matrix.target.node-artifact }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Build extension
        working-directory: extension
        shell: bash
        run: |
          npm ci
          cp ../target/${{ matrix.target.rust-target }}/release/${{ matrix.target.napi-lib }} ./cf_napi.node
          npx tsc -p ./

      - name: Package VSIX
        working-directory: extension
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Error: Invalid version '$VERSION'. Expected a semver like 0.1.0"
            exit 1
          fi
          npx @vscode/vsce package --target ${{ matrix.target.vsce-target }} -o "../staging/context-forge-${{ matrix.target.vsce-target }}-${VERSION}.vsix"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.target.vsce-target }}
          path: staging/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor ${{ github.sha }} origin/main \
            || (echo "::error::Tag is not on the main branch — aborting release" && exit 1)

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > checksums.sha256
          cat checksums.sha256

      - name: List artifacts
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: release-assets/*
