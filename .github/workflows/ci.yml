name: CI

on:
  push:
    branches: [main, develop]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    # Skip redundant CI on cargo-release version-bump commits
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    uses: ./.github/workflows/ci-checks.yml
