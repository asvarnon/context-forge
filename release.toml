# cargo-release configuration
# https://github.com/crate-ci/cargo-release/blob/master/docs/reference.md

# Only release from main
allow-branch = ["main"]

# All crates share one version (workspace.package.version)
shared-version = true
consolidate-commits = true

# We don't publish to crates.io
publish = false
# Skip cargo verification (we have CI for that)
verify = false

# Tag format: v0.2.0 (no crate prefix)
tag-name = "v{{version}}"
tag-message = "chore: release v{{version}}"

# Commit message
pre-release-commit-message = "chore: release v{{version}}"

# Push to origin
push-remote = "origin"

# Generate changelog via git-cliff before committing
# Use --workdir so git-cliff runs from workspace root (hook runs per-crate otherwise)
pre-release-hook = ["git-cliff", "--workdir", "{{workspace_root}}", "--output", "CHANGELOG.md", "--tag", "v{{version}}"]
