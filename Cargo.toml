[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.1"
edition = "2021"
license = "MIT"
repository = "https://github.com/asvarnon/context-forge"

[workspace.dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.39", features = ["bundled-full"] }
r2d2 = "0.8"
r2d2_sqlite = "0.33"
clap = { version = "4", features = ["derive"] }
napi = { version = "3", features = ["napi9"] }
napi-derive = "3"
